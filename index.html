<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ewol</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<style>

html{ -webkit-text-size-adjust:100%; }

.photo-title{
padding:12px 14px;
font-size:17px;
font-weight:700;
line-height:1.4;
}

body{
margin:0;
font-family: 'Pretendard', sans-serif;
background:#ffffff;
color:#111;
}

/* 🔥 상단바 */
.topbar{
position:sticky;
top:0;
z-index:999;
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 40px;

background:linear-gradient(90deg,#ffd6ec,#d6f0ff);
backdrop-filter: blur(6px);
box-shadow:0 6px 24px rgba(0,0,0,0.08);
}


.logo{
display:flex;
align-items:center;
gap:10px;

font-weight:900;
font-size:26px;
text-decoration:none;
color:#111;
}

.logo img{
width:52px;
height:52px;
border-radius:50%;
object-fit:cover;
}

.menu{
  display:flex;
  gap:20px;
  font-weight:600;
}

.menu a{
text-decoration:none;
color:#333;
padding:8px 14px;
border-radius:10px;
transition:0.15s;

flex:0 0 auto;
}

.menu a:hover{
background:rgba(255,255,255,0.6);
}


.search{
padding:8px 14px;
border-radius:10px;
border:none;
width:220px;
}

.search-box{
display:flex;
align-items:center;
gap:6px;
background:white;
padding:6px 10px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}


/* 🔥 전체 레이아웃 */
.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* 상단 카드 */
.grid-top{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:20px;
}

/* 공약+일정 */
.side-stack{
display:grid;
gap:20px;
}

/* 카드 공통 */
.card{
background:#fff;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 14px 32px rgba(0,0,0,0.12);
}

.menu a{
text-decoration:none;
color:#333;
padding:8px 14px;
border-radius:10px;
transition:0.18s;
}

.menu a:hover{
transform:translateY(-3px);
box-shadow:0 6px 14px rgba(0,0,0,0.08);
}



.live img{
width:100%;
height:240px;
object-fit:cover;
}

/* ✅ 모바일 전용 */
@media (max-width:767px){

.live img{
height:180px;
}

.live-title{
font-size:15px;
padding:10px;
}

}

.live-title{
padding:14px;
font-weight:700;
}

/* 공지 */
.notice{
padding:22px;
}

.notice b{
font-size:19px;
font-weight:800;
display:block;
margin-bottom:16px;
}


.notice-item{
padding:14px 6px;
border-bottom:1px solid #eee;
font-size:15px;
line-height:1.6;
cursor:pointer;
transition:0.15s;
}

.notice-item:hover{
color:#ff2d55;
padding-left:6px;
}

.notice-item:last-child{
border:none;
}

/* 공약 / 일정 */
.small-card img{
width:100%;
height:110px;
object-fit:cover;
}

.small-card{
padding-bottom:12px;
}

/* 하단 큰 카드 */
.grid-bottom{
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.big img{
width:100%;
height:260px;
object-fit:cover;
}

/* 푸터 */
.footer{
margin-top:60px;
text-align:center;
padding-bottom:30px;
}

.sns{
display:flex;
justify-content:center;
gap:20px;
font-size:22px;
opacity:0.6;
}

.sns a{
text-decoration:none;
color:black;
}

.sns a:hover{
opacity:1;
}

@media(max-width:900px){

.grid-top{
grid-template-columns:1fr;
}

.grid-bottom{
grid-template-columns:1fr;
}

/* ⭐ 메뉴 끝 살짝 잘리게 */
.menu{
padding-right:24px;
}

}

/* 🔴 LIVE 점 업그레이드 */
.live-dot{
width:10px;
height:10px;
background:#ff2d55;
border-radius:50%;
display:inline-block;
margin-right:6px;
animation:blink 1s infinite;
}

.live-dot.off{
background:#bbb;
animation:none;
opacity:.6;
}

#liveText{
font-weight:700;
color:#ff2d55;
}

#liveText.off{
color:#999;
}

#liveTitle{
  margin-top:8px;
  font-weight:800;
  color:#111;
  line-height:1.4;
  word-break:keep-all;
  font-size:clamp(15px, 2.2vw, 18px);
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.2;}
100%{opacity:1;}
}

.promise-card:hover img{
transform:scale(1.05);
}

.promise-overlay{
padding:6px 16px;
}


/* 🔥 공약 모달 */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-img{
max-height:92vh;
max-width:92vw;
border-radius:14px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.modal-close{
position:absolute;
top:20px;
right:24px;
font-size:40px;   /* 🔥 34 → 40 추천 */
color:white;
cursor:pointer;
}

/* =========================
   ✅ 모바일 최적화 (복붙)
   ========================= */
@media (max-width: 600px){

  /* 상단바: 세로 정렬 + 여백 줄이기 */
.topbar{
  padding: 10px 14px;
  display:flex;
  flex-direction: column;
  align-items: center;   /* stretch → center 로 변경 */
  gap: 10px;
}

  /* 로고 */
.logo{
  font-size: 22px;
  line-height: 1;

  width:100%;
  display:flex;
  justify-content:center;
}

  /* 메뉴: 가로 스크롤 */
.menu{
  width:100%;
  display:flex;
  justify-content:flex-start;

  gap: 10px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  white-space: nowrap;
  padding-bottom: 6px;
}

  .menu a{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 12px;   /* 터치 영역 키움 */
    font-size: 14px;
    border-radius: 12px;
    flex: 0 0 auto;
  }

.menu-wrap{
  position:relative;
}

/* 검색창: 모바일에서 오른쪽 잘림 방지 */
  .topbar{
    box-sizing: border-box;
  }

  .search-box{
    width: 100%;
    box-sizing: border-box;
    min-width: 0;
  }

  .search{
    width: 100%;
    font-size: 15px;
    min-width: 0;   /* ⭐ flex에서 잘림 방지 핵심 */
    flex: 1;        /* ⭐ input이 남는 공간 먹게 */
  }


  /* 본문 패딩 */
  .container{
    padding: 18px 12px;
  }

  /* 카드 hover 튐 방지(모바일은 hover 없음) */
  .card:hover{
    transform: none;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
  }

  /* 이미지 높이 모바일용 */
  .live img{ height: 200px; }
  .big img{ height: 200px; }
  .small-card img{ height: 110px; }

  /* 공지 영역 */
  .notice{ padding: 16px; }
  .notice b{ font-size: 17px; margin-bottom: 12px; }
  .notice-item{ font-size: 14px; padding: 12px 4px; }

  /* 큰 카드 제목 글씨 */
  .photo-title{
    font-size: 15px;
    padding: 12px 12px;
  }

  /* 모달 닫기 버튼: 터치 쉽게 */
  .modal-close{
    top: 14px;
    right: 16px;
    font-size: 44px;
  }
}

@media (min-width:768px) and (max-width:1024px) and (orientation:portrait){

  .topbar{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    padding:12px 20px;
  }

  .logo{
    width:100%;
    justify-content:center;
  }

  .menu{
    width:100%;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    overflow:visible;
    white-space:normal;
  }

  .search-box{
    width:100%;
    max-width:none;
    box-sizing:border-box;
  }

  .search{
    width:100%;
  }

}

/* 아주 작은 폰 (아이폰 SE급) */
@media (max-width: 360px){
  .menu a{ font-size: 13px; padding: 9px 10px; }
  .live img, .big img{ height: 180px; }
}


.modal-close:hover{
transform:scale(1.2);
}
.promise-menu{
font-weight:800;
}

.promise-menu:hover{
  transform:scale(1.08);
}

/* ✅ iPad 가로(터치기기만) : 로고 1줄 / 메뉴+검색 2줄 */
@media (hover: none) and (pointer: coarse) and (min-width:768px) and (max-width:1366px) and (orientation:landscape){

  .topbar{
    display:grid !important;
    grid-template-columns: 1fr 280px;   /* 검색창 더 길게 */
    grid-template-areas:
      "logo logo"
      "menu search";
    align-items:center;
    gap:12px 18px;
    padding:10px 16px;
  }

  .logo{
    grid-area:logo;
    width:100%;
    display:flex;
    justify-content:center;
  }

  .menu{
    grid-area:menu;
    display:flex;
    align-items:center;
    justify-content:center;   /* 왼쪽 몰림 해결 */
    gap:14px;                 /* 메뉴 간격 */
    overflow:visible;
    white-space:nowrap;
  }

  .search-box{
    grid-area:search;
    width:280px;              /* 검색창 더 길게 */
    justify-self:end;
  }

  .search{ width:100%; }
}

</style>
</head>
<body>

<script>

<script>

document.addEventListener("DOMContentLoaded", function(){

const card = document.getElementById("live-card");

card.style.display = "block";

card.innerHTML = `
<div id="liveClick" style="cursor:pointer;">

  <img id="liveImg" src="live.gif"
  style="width:100%;height:240px;object-fit:cover;border-radius:18px;">

  <div style="padding:10px;font-weight:700;">
    <span id="liveDot" class="live-dot off"></span>
    <span id="liveText" class="off">방송 준비중</span>
    <div id="liveTitle"></div>
  </div>


</div>
`;

});

</script>
<!-- 🔥 공약 모달 -->
<div id="promiseModal" class="modal" onclick="closePromise()">
  <span class="modal-close" onclick="closePromise()">✕</span>
  <img src="promise.jpg" class="modal-img" onclick="event.stopPropagation()">
</div>

<script>

const BJID = "bc3yu2fl";
const CHECK_URL = `https://live.sooplive.co.kr/afreeca/player_live_api.php?bjid=${BJID}&type=live`;

async function updateLiveDot(){

  const dot = document.getElementById("liveDot");
  const text = document.getElementById("liveText");
  const img = document.getElementById("liveImg");
  const title = document.getElementById("liveTitle");
  const card = document.getElementById("liveClick");

  if (!dot || !text || !img || !title) return;

  try{

    const res = await fetch(
      "https://flat-bonus-acec.yoonji061012.workers.dev/?bj=bc3yu2fl",
      { cache:"no-store" }
    );

    const data = await res.json();

    const isLive = data.RESULT === 1;

    // 🔥 방송중
    if(isLive){

      dot.classList.remove("off");
      text.classList.remove("off");

      text.innerText = "LIVE 방송";

      title.innerText = data.title ?? "";

      card.onclick = () => window.open(data.url);

      // ⭐ 썸네일 자동
      img.src = `https://liveimg.sooplive.co.kr/${data.broadNo}.jpg?${Date.now()}`;

    }

    // 🔵 방송 OFF
    else{

      dot.classList.add("off");
      text.classList.add("off");

      text.innerText = "방송 준비중";
      title.innerText = "";

      img.src = "live.gif";

      card.onclick = () =>
        window.open("https://play.sooplive.co.kr/bc3yu2fl");

    }

  }catch(e){

    text.innerText = "방송 준비중";

  }
}

document.addEventListener("DOMContentLoaded", () => {
  updateLiveDot();
  setInterval(updateLiveDot, 20000);
});

</script>
